{% extends "base.html" %}

{% block title %}Page Not Found - TalentAI{% endblock %}

{% block content %}
<div class="error-container">
    <div class="error-content">
        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p>Sorry, the page you are looking for doesn't exist or has been moved.</p>
        <div class="error-actions">
            <a href="{{ url_for('index') }}" class="btn btn-primary">
                <i class="fas fa-home"></i> Go to Homepage
            </a>
            <a href="javascript:history.back()" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Go Back
            </a>
        </div>
        <div class="error-help">
            <p>Need help? <a href="{{ url_for('contact') }}">Contact Support</a></p>
        </div>
    </div>
</div>

<style>
    .error-container {
        min-height: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
    }

    .error-content {
        max-width: 500px;
    }

    .error-code {
        font-size: 8rem;
        font-weight: 800;
        color: var(--accent-primary);
        line-height: 1;
        margin-bottom: 1rem;
        text-shadow: 4px 4px 8px rgba(0,0,0,0.1);
    }

    .error-content h1 {
        font-size: 2rem;
        color: var(--text-primary);
        margin-bottom: 1rem;
    }

    .error-content p {
        color: var(--text-secondary);
        margin-bottom: 2rem;
        font-size: 1.1rem;
    }

    .error-actions {
        display: flex;
        gap: 1rem;
        justify-content: center;
        margin-bottom: 2rem;
    }

    .error-help {
        color: var(--text-muted);
        font-size: 0.9rem;
    }

    .error-help a {
        color: var(--accent-primary);
        text-decoration: none;
    }

    .error-help a:hover {
        text-decoration: underline;
    }

    @media (max-width: 768px) {
        .error-code {
            font-size: 5rem;
        }

        .error-content h1 {
            font-size: 1.5rem;
        }

        .error-actions {
            flex-direction: column;
            align-items: center;
        }

        .error-actions .btn {
            width: 200px;
        }
    }
</style>
{% endblock %}
