<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Password Reset</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #6d5dfc, #5a4bda); color: white; padding: 30px; text-align: center; }
        .content { padding: 30px; background: #f9f9f9; }
        .button { display: inline-block; padding: 12px 30px; background: #6d5dfc; color: white; text-decoration: none; border-radius: 5px; }
        .warning { background: #fff3cd; border-left: 4px solid #ffc107; padding: 15px; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ResumeRadar</h1>
            <h1>Password Reset Request</h1>
        </div>
        <div class="content">
            <p>Dear <strong>{{ name }}</strong>,</p>
            <p>We received a request to reset your password.</p>
            <p style="text-align: center;">
                <a href="{{ reset_url }}" class="button">Reset Password</a>
            </p>
            <div class="warning">
                <p><strong>⚠️ This link will expire in 1 hour</strong></p>
            </div>
            <p>If you didn't request this, please ignore this email.</p>
        </div>
    </div>
</body>
</html>
