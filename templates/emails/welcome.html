<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Welcome to AI Resume Screener</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #6d5dfc, #5a4bda); color: white; padding: 30px; text-align: center; }
        .content { padding: 30px; background: #f9f9f9; }
        .button { display: inline-block; padding: 12px 30px; background: #6d5dfc; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Welcome to AI Resume Screener!</h1>
        </div>
        <div class="content">
            <p>Dear <strong>{{ name }}</strong>,</p>
            <p>Thank you for registering! We're excited to have you on board.</p>
            <p>Get started by uploading your resume and exploring job opportunities.</p>
            <p style="text-align: center;">
                <a href="{{ url_for('jobseeker_dashboard', _external=True) }}" class="button">Go to Dashboard</a>
            </p>
        </div>
    </div>
</body>
</html>
