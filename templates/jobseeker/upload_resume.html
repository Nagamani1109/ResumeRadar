<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Resume - ResumeMind AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0a0c10;
            --bg-darker: #050608;
            --bg-card: #1a1e24;
            --text-primary: #ffffff;
            --text-secondary: #b0b8c5;
            --accent-primary: #4361ee;
            --accent-success: #4cc9f0;
            --border-color: #2d343d;
            --gradient-1: linear-gradient(135deg, #4361ee 0%, #7209b7 100%);
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }
        
        body {
            background: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
        }
        
        .navbar {
            background: #0f1217;
            border-bottom: 1px solid var(--border-color);
            padding: 15px 0;
        }
        
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-primary);
            font-weight: 700;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--gradient-1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logout-btn {
            background: transparent;
            border: 1px solid #f72585;
            color: #f72585;
            padding: 8px 20px;
            border-radius: 25px;
            text-decoration: none;
        }
        
        .main-content {
            padding: 40px 20px;
        }
        
        .upload-container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .upload-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }
        
        .upload-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-1);
        }
        
        .upload-area {
            border: 3px dashed var(--border-color);
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 30px;
        }
        
        .upload-area:hover {
            border-color: var(--accent-primary);
            background: rgba(67, 97, 238, 0.05);
        }
        
        .upload-area i {
            font-size: 4rem;
            color: var(--accent-primary);
            margin-bottom: 20px;
        }
        
        .upload-area h4 {
            color: var(--text-primary);
            margin-bottom: 10px;
        }
        
        .upload-area p {
            color: var(--text-secondary);
        }
        
        .file-info {
            background: var(--bg-darker);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .btn-upload {
            background: var(--gradient-1);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s;
        }
        
        .btn-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(67, 97, 238, 0.3);
        }
        
        .current-resume {
            background: var(--bg-darker);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="/">
                <div class="logo-icon">
                    <i class="fas fa-brain"></i>
                </div>
                <span>ResumeMind AI</span>
            </a>
            <a href="/logout" class="logout-btn">
                <i class="fas fa-sign-out-alt me-2"></i>Logout
            </a>
        </div>
    </nav>

    <div class="main-content container">
        <div class="upload-container">
            <div class="upload-card">
                <h2 class="mb-4">Upload Your Resume</h2>
                
                {% if current_resume %}
                <div class="current-resume">
                    <div>
                        <i class="fas fa-file-pdf me-2" style="color: var(--accent-success);"></i>
                        <span>{{ current_resume.file_name }}</span>
                    </div>
                    <span class="text-secondary">Uploaded: {{ current_resume.uploaded_at.strftime('%Y-%m-%d') }}</span>
                </div>
                {% endif %}
                
                <form method="POST" enctype="multipart/form-data" id="uploadForm">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <h4>Click or Drag & Drop</h4>
                        <p>Supported formats: PDF, DOCX, DOC, TXT (Max 16MB)</p>
                        <input type="file" name="resume" id="fileInput" style="display: none;" accept=".pdf,.docx,.doc,.txt" required>
                    </div>
                    
                    <div id="fileInfo" style="display: none;" class="file-info">
                        <div>
                            <i class="fas fa-file me-2"></i>
                            <span id="fileName"></span>
                        </div>
                        <span id="fileSize"></span>
                    </div>
                    
                    <button type="submit" class="btn-upload mt-4" id="submitBtn" disabled>
                        <i class="fas fa-upload me-2"></i>Upload & Analyze
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('fileInfo').style.display = 'flex';
                document.getElementById('fileName').textContent = file.name;
                document.getElementById('fileSize').textContent = (file.size / 1024).toFixed(2) + ' KB';
                document.getElementById('submitBtn').disabled = false;
            }
        });
    </script>
</body>
</html>
